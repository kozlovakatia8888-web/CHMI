<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глобальный тест по всем темам HCI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0f1a; font-family: 'Inter', system-ui, sans-serif; color: #e2e8f0; line-height: 1.5; padding: 2rem 1rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: #0f172a;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #1e293b;
        }
        .nav-btn {
            background: #1e293b;
            color: #94a3b8;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #334155;
        }
        .nav-btn:hover { background: #2d3a4f; color: #f1f5f9; border-color: #3b82f6; transform: translateY(-2px); }
        .nav-group { display: flex; gap: 0.8rem; }
        .hero { margin-bottom: 2rem; border-left: 4px solid #3b82f6; padding-left: 1.5rem; }
        .hero h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #f0f9ff, #b9e2ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.5rem; }
        .section { background: #0f172a; border-radius: 1.2rem; padding: 1.5rem; margin: 1.8rem 0; border: 1px solid #1e293b; }
        .section h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; color: #b9e2ff; border-left: 3px solid #3b82f6; padding-left: 0.8rem; }
        .question-block {
            background: #111827;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #2d3a4f;
        }
        .question-block p { font-weight: 600; margin-bottom: 0.5rem; }
        .options { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.5rem; }
        .option { display: flex; align-items: center; gap: 0.6rem; }
        .option input { accent-color: #3b82f6; width: 18px; height: 18px; }
        .explanation {
            display: none;
            margin-top: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            background: #1e293b;
            border-left: 4px solid #facc15;
            font-size: 0.9rem;
        }
        .explanation.show { display: block; }
        .explanation.correct { border-left-color: #4caf50; background: #1a2a1a; }
        .explanation.wrong { border-left-color: #ef4444; background: #2a1a1a; }
        .result-summary {
            text-align: center;
            font-size: 1.2rem;
            padding: 1rem;
            background: #1e1b2e;
            border-radius: 1rem;
            margin-top: 1.5rem;
        }
        .btn-submit {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }
        .btn-submit:hover { background: #2563eb; transform: scale(1.02); }
        footer { margin-top: 2.5rem; text-align: center; font-size: 0.8rem; color: #5b6e8c; border-top: 1px solid #1e293b; padding-top: 1.5rem; }
        @media (max-width: 700px) { .nav-bar { flex-direction: column; } .hero h1 { font-size: 1.5rem; } }
        .score-badge { display: inline-block; background: #14532d; color: #86efac; padding: 0.2rem 0.8rem; border-radius: 20px; margin-left: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <div class="nav-group">
            <a href="index.html" class="nav-btn">🏠 На главную</a>
            <a href="code.html" class="nav-btn">← Назад </a>
        </div>
        <a href="q21.html" class="nav-btn">Вперёд (мотивация) →</a>
    </div>
    <div class="hero">
        <h1>🧠 Глобальный тест по всем 20 темам</h1>
        <p>40 вопросов — проверь свои знания по дисциплине «Человекомашинные интерфейсы».</p>
    </div>
    <div class="section" id="quiz-section">
        <h2>Ответьте на все вопросы</h2>
        <div id="quiz-container"></div>
        <button class="btn-submit" id="check-btn">✅ Проверить ответы</button>
        <div id="result-area" style="margin-top: 1rem;"></div>
    </div>
    <footer>Глобальный тест · HCI Экзамен · Удачи!</footer>
</div>
<script>
    // Массив вопросов: по 2 на каждую из 20 тем = 40 вопросов
    const quizData = [
        // Тема 1: Архитектурные парадигмы
        {
            question: "Какая архитектура обеспечивает лучший SEO «из коробки» и быстрый TTV, но требует гидратации для интерактивности?",
            options: ["SPA (CSR)", "MPA", "SSR", "SSG"],
            correct: 2,
            explanation: "SSR отдаёт готовый HTML (хороший SEO и TTV), но для интерактивности нужна гидратация. SSG даёт ещё быстрее, но не всегда подходит для динамических данных."
        },
        {
            question: "Что из перечисленного является основным недостатком SPA (CSR) с точки зрения SEO?",
            options: ["Нет поддержки JavaScript", "Пустой контейнер при первом заходе", "Медленный сервер", "Сложные URL"],
            correct: 1,
            explanation: "SPA при первом заходе отдаёт пустой div#root, поэтому поисковые роботы не видят контент без специальной обработки."
        },
        // Тема 2: DOM и события
        {
            question: "В каком порядке срабатывают обработчики событий, если один установлен на фазе захвата, а другой на всплытии?",
            options: ["Сначала всплытие, потом захват", "Сначала захват, потом цель, потом всплытие", "Только захват", "Зависит от браузера"],
            correct: 1,
            explanation: "Событие проходит фазу захвата (сверху вниз), затем цель, затем всплытие (снизу вверх)."
        },
        {
            question: "Для чего используется делегирование событий?",
            options: ["Чтобы ускорить загрузку страницы", "Чтобы обрабатывать события на динамически добавленных элементах", "Чтобы остановить всплытие", "Чтобы изменить порядок фаз"],
            correct: 1,
            explanation: "Делегирование позволяет повесить один обработчик на родителя и ловить события от всех детей, включая будущие."
        },
        // Тема 3: законы Фиттса и Хика
        {
            question: "Согласно закону Фиттса, какая кнопка будет достигнута быстрее?",
            options: ["Маленькая, но близкая", "Большая, но далёкая", "Средняя, на среднем расстоянии", "Зависит от цвета"],
            correct: 1,
            explanation: "Время зависит от D/W. Большая кнопка (большой W) компенсирует расстояние; формула T = a + b·log₂(D/W+1)."
        },
        {
            question: "Как закон Хика влияет на проектирование меню?",
            options: ["Нужно делать пункты крупнее", "Нужно группировать пункты, не показывать более 5-7 за раз", "Нужно использовать яркие цвета", "Нужно добавлять анимацию"],
            correct: 1,
            explanation: "Время выбора растёт логарифмически с числом альтернатив. Группировка уменьшает n на каждом шаге."
        },
        // Тема 4: GOMS и KLM
        {
            question: "Какая модель позволяет предсказать время выполнения задачи, суммируя времена примитивных операций (K, P, B, M)?",
            options: ["GOMS", "KLM", "Fitts", "Hick"],
            correct: 1,
            explanation: "KLM (Keystroke-Level Model) — упрощённая версия GOMS, использует фиксированные времена для клавиш, указания, нажатий и ментальных операций."
        },
        {
            question: "Что означает оператор M в KLM?",
            options: ["Mouse move", "Mental preparation", "Message", "Memory"],
            correct: 1,
            explanation: "M — Mental (ментальная подготовка, обдумывание). Это самый дорогой оператор (~1.35 с)."
        },
        // Тема 5: Когнитивная нагрузка и закон Миллера
        {
            question: "Согласно закону Миллера, сколько объектов человек может удерживать в рабочей памяти одновременно?",
            options: ["3–4", "5–9", "10–15", "20–30"],
            correct: 1,
            explanation: "Закон Миллера (7 ± 2) утверждает, что рабочая память удерживает 5–9 несвязанных элементов."
        },
        {
            question: "Какой приём снижает когнитивную нагрузку, показывая дополнительные опции только по требованию?",
            options: ["Группировка", "Прогрессивное раскрытие", "Узнавание вместо воспоминания", "Автоматизация"],
            correct: 1,
            explanation: "Прогрессивное раскрытие (progressive disclosure) сначала показывает основные варианты, а расширенные — по кнопке «Ещё»."
        },
        // Тема 6: Критерии юзабилити
        {
            question: "Какой опросник даёт интегральную оценку юзабилити по шкале 0–100?",
            options: ["SUS", "SEQ", "NASA-TLX", "ASQ"],
            correct: 0,
            explanation: "SUS (System Usability Scale) — 10 вопросов, сумма баллов умножается на 2.5, диапазон 0–100."
        },
        {
            question: "Что измеряет SEQ (Single Ease Question)?",
            options: ["Общую удовлетворённость", "Сложность конкретной задачи", "Когнитивную нагрузку", "Время выполнения"],
            correct: 1,
            explanation: "SEQ задаётся сразу после задачи: «Насколько легко было выполнить задачу?» — это локальная оценка сложности."
        },
        // Тема 7: ORM
        {
            question: "Какой антипаттерн ORM возникает, когда в цикле подгружаются связанные данные для каждого родителя?",
            options: ["God Object", "N+1 запрос", "Lazy Loading", "Identity Map"],
            correct: 1,
            explanation: "Проблема N+1: 1 запрос на родителей + N запросов на детей. Решение — жадная загрузка (JOIN FETCH)."
        },
        {
            question: "Что такое 'объектно-реляционное несоответствие' (impedance mismatch)?",
            options: ["Разные версии БД", "Разница между объектной моделью и реляционной таблицей", "Проблема с индексами", "Конфликт транзакций"],
            correct: 1,
            explanation: "Это фундаментальное различие: наследование, ссылки, типы данных не совпадают с таблицами и внешними ключами."
        },
        // Тема 8: Сериализация
        {
            question: "Какой формат сериализации считается небезопасным для данных от пользователя из-за риска RCE?",
            options: ["JSON", "XML", "Python pickle", "MessagePack"],
            correct: 2,
            explanation: "pickle и Java Serialization могут выполнить произвольный код при десериализации. JSON и XML безопасны при стандартном парсинге."
        },
        {
            question: "Какое преимущество у JSON перед XML для веб-API?",
            options: ["Поддерживает циклические ссылки", "Меньший размер и быстрее парсится", "Сохранение типов данных", "Безопаснее"],
            correct: 1,
            explanation: "JSON менее избыточен и быстрее парсится, чем XML, что делает его стандартом для REST API."
        },
        // Тема 9: Аутентификация, сессии, JWT
        {
            question: "Какой подход позволяет мгновенно отозвать доступ пользователя (например, при блокировке)?",
            options: ["JWT", "Сессии (stateful)", "OAuth 2.0", "Basic Auth"],
            correct: 1,
            explanation: "При сессиях сервер хранит состояние и может удалить сессию. JWT нельзя отозвать до истечения срока."
        },
        {
            question: "Какой недостаток у JWT при хранении в localStorage?",
            options: ["Уязвимость к CSRF", "Уязвимость к XSS", "Большой размер", "Сложность с CORS"],
            correct: 1,
            explanation: "localStorage доступен для JavaScript, поэтому при XSS злоумышленник может украсть токен. Cookie с HttpOnly защищены."
        },
        // Тема 10: OAuth 2.0
        {
            question: "Какую проблему решает OAuth 2.0?",
            options: ["Аутентификацию пользователя", "Делегирование доступа без передачи пароля", "Шифрование данных", "Управление сессиями"],
            correct: 1,
            explanation: "OAuth позволяет приложению получить ограниченный доступ к данным пользователя, не зная его пароля."
        },
        {
            question: "В Authorization Code Flow зачем нужен временный код вместо прямого токена?",
            options: ["Чтобы ускорить процесс", "Из соображений безопасности — токен не передаётся через браузер", "Чтобы сократить трафик", "По техническим ограничениям"],
            correct: 1,
            explanation: "Код передаётся через браузер, а токен обменивается по прямому сервер-серверному каналу, что предотвращает перехват."
        },
        // Тема 11: OpenAPI и Swagger
        {
            question: "Какой инструмент Swagger генерирует интерактивную документацию с возможностью выполнять запросы (Try it out)?",
            options: ["Swagger Editor", "Swagger UI", "Swagger Codegen", "SwaggerHub"],
            correct: 1,
            explanation: "Swagger UI — это визуализация спецификации с кнопкой Try it out для отправки реальных запросов."
        },
        {
            question: "Для чего используется Swagger Codegen?",
            options: ["Редактирование спецификации", "Визуализация API", "Генерация клиентского кода на разных языках", "Логирование запросов"],
            correct: 2,
            explanation: "Swagger Codegen генерирует SDK для клиентов (Python, Java, TypeScript и др.) из OpenAPI-файла."
        },
        // Тема 12: REST, GraphQL, gRPC
        {
            question: "Какой протокол использует бинарную сериализацию (Protobuf) и HTTP/2, поддерживает стриминг?",
            options: ["REST", "GraphQL", "gRPC", "SOAP"],
            correct: 2,
            explanation: "gRPC работает поверх HTTP/2, использует Protocol Buffers и поддерживает все виды стриминга."
        },
        {
            question: "Какая проблема REST решается с помощью GraphQL?",
            options: ["Безопасность", "Over-fetching и under-fetching", "Отсутствие типизации", "Сложность с кешированием"],
            correct: 1,
            explanation: "GraphQL позволяет клиенту запрашивать только нужные поля (нет over-fetching) и получать все данные за один запрос."
        },
        // Тема 13: Дизайн-системы и доступность
        {
            question: "Какой принцип WCAG требует, чтобы вся информация была представлена в разных форматах (текст, звук, визуал)?",
            options: ["Perceivable", "Operable", "Understandable", "Robust"],
            correct: 0,
            explanation: "Perceivable (Воспринимаемость) — информация должна быть доступна через разные каналы."
        },
        {
            question: "Какой атрибут используется для скрытия декоративных элементов от скринридера?",
            options: ["aria-label", "aria-hidden", "role", "alt"],
            correct: 1,
            explanation: "aria-hidden='true' скрывает элемент от вспомогательных технологий. aria-label добавляет подпись для интерактивных элементов."
        },
        // Тема 14: Визуальная композиция и цвет
        {
            question: "Какая цветовая пропорция считается классической для интерфейса (60-30-10)?",
            options: ["Основной 60%, вторичный 30%, акцентный 10%", "Основной 50%, вторичный 30%, акцентный 20%", "Основной 70%, вторичный 20%, акцентный 10%", "Все цвета поровну"],
            correct: 0,
            explanation: "60% — фон (нейтральный), 30% — крупные блоки, 10% — акцентные элементы (кнопки CTA)."
        },
        {
            question: "Что такое доминанта в композиции?",
            options: ["Главный элемент, притягивающий взгляд", "Повторяющийся паттерн", "Симметричное распределение", "Цветовой акцент"],
            correct: 0,
            explanation: "Доминанта — визуальный центр, который привлекает внимание первым (размером, цветом, положением)."
        },
        // Тема 15: Islands Architecture и RSC
        {
            question: "Какой паттерн предполагает статический HTML с изолированными интерактивными виджетами (островами)?",
            options: ["SPA", "SSR", "Islands Architecture", "CSR"],
            correct: 2,
            explanation: "Islands Architecture (Astro) отдаёт статический HTML, а интерактивные компоненты загружают свой JS отдельно."
        },
        {
            question: "Какое преимущество дают React Server Components (RSC)?",
            options: ["Возможность использовать хуки в серверных компонентах", "Серверный код не попадает в клиентский бандл", "Встроенное кеширование", "Автоматическая типизация"],
            correct: 1,
            explanation: "Серверные компоненты выполняются только на сервере, их зависимости не отправляются в браузер, что уменьшает размер бандла."
        },
        // Тема 16: Безопасность (XSS, CSRF, SQLi)
        {
            question: "Какой метод является золотым стандартом защиты от SQL-инъекций?",
            options: ["Экранирование кавычек", "Параметризованные запросы", "Валидация на клиенте", "CAPTCHA"],
            correct: 1,
            explanation: "Параметризованные запросы (prepared statements) отделяют код SQL от данных, что полностью предотвращает инъекции."
        },
        {
            question: "Что из перечисленного защищает от CSRF-атак?",
            options: ["HttpOnly", "SameSite=Lax", "CSP", "Escape-функции"],
            correct: 1,
            explanation: "SameSite=Lax запрещает отправку cookie в межсайтовых POST-запросах, что предотвращает CSRF. Также помогают CSRF-токены."
        },
        // Тема 17: Микрофронтенды
        {
            question: "Какой способ интеграции микрофронтендов обеспечивает полную изоляцию CSS и JS, но имеет проблемы с SEO и навигацией?",
            options: ["Module Federation", "Web Components", "iframe", "NPM-пакеты"],
            correct: 2,
            explanation: "iframe даёт максимальную изоляцию, но страдает SEO, роутингом и производительностью."
        },
        {
            question: "Что из перечисленного является преимуществом Module Federation?",
            options: ["Полная изоляция стилей", "Общие зависимости (singleton)", "Простота настройки", "Поддержка SSR"],
            correct: 1,
            explanation: "Module Federation позволяет использовать общие библиотеки (React, lodash) как синглтоны, избегая дублирования."
        },
        // Тема 18: Middleware и DI
        {
            question: "Какой паттерн управления зависимостями считается антипаттерном в сравнении с DI?",
            options: ["Factory", "Singleton", "Service Locator", "Observer"],
            correct: 2,
            explanation: "Service Locator скрывает зависимости внутри класса, усложняет тестирование и создаёт скрытые связи."
        },
        {
            question: "Для каких задач обычно используется middleware?",
            options: ["Управление зависимостями", "Логирование, аутентификация, CORS", "Сериализация данных", "Генерация кода"],
            correct: 1,
            explanation: "Middleware обрабатывает сквозные задачи (cross-cutting concerns) в конвейере запросов."
        },
        // Тема 19: Типографика
        {
            question: "Какой оптимальный интерлиньяж (line-height) для основного текста?",
            options: ["1.0", "1.2", "1.5", "2.0"],
            correct: 2,
            explanation: "Рекомендуемый интерлиньяж 1.4–1.6 от размера шрифта. 1.5 — золотая середина."
        },
        {
            question: "Какая длина строки (в символах) считается оптимальной для чтения с экрана?",
            options: ["20-30", "50-75", "100-120", "150-200"],
            correct: 1,
            explanation: "50–75 символов на строку (включая пробелы) обеспечивают комфортное чтение без потери ритма."
        },
        // Тема 20: Восприятие и внимание
        {
            question: "Какая зона страницы сканируется хуже всего согласно F-паттерну?",
            options: ["Верхний левый угол", "Верхняя строка", "Правая нижняя четверть", "Левая колонка"],
            correct: 2,
            explanation: "F-паттерн показывает, что правая нижняя область почти не сканируется пользователями."
        },
        {
            question: "Какой эффект описывает лучшее запоминание первых и последних элементов списка?",
            options: ["Эффект Фиттса", "Эффект последовательной позиции", "Эффект Миллера", "Эффект Хика"],
            correct: 1,
            explanation: "Эффект последовательной позиции (primacy/recency) — первые и последние элементы запоминаются лучше, середина хуже."
        }
    ];

    function buildQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        quizData.forEach((q, idx) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            block.dataset.index = idx;
            const questionP = document.createElement('p');
            questionP.textContent = `${idx+1}. ${q.question}`;
            block.appendChild(questionP);
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            q.options.forEach((opt, optIdx) => {
                const label = document.createElement('label');
                label.className = 'option';
                const input = document.createElement('input');
                input.type = 'radio';
                input.name = `q${idx}`;
                input.value = optIdx;
                label.appendChild(input);
                label.appendChild(document.createTextNode(` ${opt}`));
                optionsDiv.appendChild(label);
            });
            block.appendChild(optionsDiv);
            // контейнер для объяснения
            const expl = document.createElement('div');
            expl.className = 'explanation';
            expl.id = `expl-${idx}`;
            expl.innerHTML = `<strong>Пояснение:</strong> ${q.explanation}`;
            block.appendChild(expl);
            container.appendChild(block);
        });
    }

    function checkQuiz() {
        let score = 0;
        const total = quizData.length;
        const results = [];
        for (let i = 0; i < total; i++) {
            const q = quizData[i];
            const inputs = document.querySelectorAll(`input[name="q${i}"]`);
            let selected = null;
            for (let inp of inputs) {
                if (inp.checked) { selected = parseInt(inp.value); break; }
            }
            const isCorrect = (selected === q.correct);
            if (isCorrect) score++;
            results.push({ index: i, selected, correct: q.correct, isCorrect });
            // показываем объяснение
            const explDiv = document.getElementById(`expl-${i}`);
            explDiv.classList.add('show');
            if (isCorrect) {
                explDiv.className = 'explanation show correct';
            } else {
                explDiv.className = 'explanation show wrong';
            }
            // подсветка правильного ответа (опционально можно добавить)
        }
        // показать результат
        const resultArea = document.getElementById('result-area');
        const percent = Math.round((score / total) * 100);
        let grade = '';
        if (percent >= 90) grade = '🌟 Отлично! Ты эксперт HCI!';
        else if (percent >= 70) grade = '💪 Хорошо! Есть куда расти.';
        else if (percent >= 50) grade = '📚 Стоит повторить некоторые темы.';
        else grade = '📖 Рекомендуем пересмотреть материал.';
        resultArea.innerHTML = `
            <div class="result-summary">
                <strong>Результат:</strong> ${score} из ${total} правильных (${percent}%)<br>
                ${grade}
                <span style="display:block; margin-top:0.5rem; font-size:0.9rem; color:#94a3b8;">Каждый вопрос теперь показывает пояснение — зелёное (правильно) или красное (неправильно).</span>
            </div>
        `;
        // прокрутка к результату
        resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    document.addEventListener('DOMContentLoaded', () => {
        buildQuiz();
        document.getElementById('check-btn').addEventListener('click', checkQuiz);
    });
</script>
</body>
</html>
